<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental Service</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 1rem;
        }
        .container { 
            background: #fff; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,.2); 
            width: 100%; 
            max-width: 550px; 
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        h1 { 
            font-size: 2rem; 
            color: #333; 
            margin-bottom: 0.5rem;
        }
        .subtitle {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }
        .form-group { 
            margin-bottom: 1.3rem; 
        }
        label { 
            display: block; 
            margin-bottom: 0.4rem; 
            font-weight: 600; 
            color: #333;
            font-size: 0.95rem;
        }
        input { 
            width: 100%; 
            padding: 0.75rem 1rem; 
            border: 2px solid #e0e0e0; 
            border-radius: 6px; 
            font: inherit; 
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        button { 
            width: 100%; 
            padding: 0.9rem; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff; 
            border: none; 
            border-radius: 6px; 
            font-size: 1rem; 
            font-weight: 600;
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 0.5rem;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .alert { 
            padding: 1rem; 
            border-radius: 6px; 
            margin-bottom: 1.5rem; 
            display: none;
            font-size: 0.95rem;
        }
        .alert.success { 
            background: #d4edda; 
            color: #155724; 
            border: 2px solid #c3e6cb; 
        }
        .alert.error { 
            background: #f8d7da; 
            color: #721c24; 
            border: 2px solid #f5c6cb; 
        }
        .form-description {
            color: #999;
            font-size: 0.85rem;
            margin-top: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🚗</div>
            <h1>Car Rental Service</h1>
            <p class="subtitle">Complete your booking information</p>
        </div>

        <div id="alert" class="alert"></div>
        
        <form method="POST" action="contact.php">
            <div class="form-group">
                <label for="gmail">Gmail Address</label>
                <input 
                    type="email" 
                    id="gmail" 
                    name="gmail" 
                    placeholder="your.email@gmail.com" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="contract">Contract Number</label>
                <input 
                    type="text" 
                    id="contract" 
                    name="contract" 
                    placeholder="e.g., CNT-2024-001234" 
                    required
                >
            </div>

            <div class="form-group">
                <label for="address">Address</label>
                <input 
                    type="text" 
                    id="address" 
                    name="address" 
                    placeholder="Your pickup/delivery address" 
                    required
                >
            </div>

            <button type="submit">Submit Booking Information</button>
            <p class="form-description">Your information is secure and will only be used for rental purposes.</p>
        </form>
    </div>
</body>
</html>
